  <!-- 图片预览模态框 -->
  <div id="imagePreviewModal" class="image-preview-modal" style="display: none;">
    <div class="image-preview-backdrop"></div>
    <div class="image-preview-content">
      <button class="image-preview-close">×</button>
      <div class="image-preview-wrapper">
        <img id="imagePreviewImg" src="" alt="预览">
      </div>
      <div class="image-preview-info">
        <div class="preview-info-header">
          <h4 id="imagePreviewTitle"></h4>
          <button class="btn-copy-preview" id="previewCopyBtn">📋 复制提示词</button>
        </div>
        <p id="imagePreviewPrompt"></p>
      </div>
    </div>
  </div>
