            <!-- 模型类型选择器 -->
            <div class="model-type-selector">
              <!-- 添加醒目的标题 -->
              <div class="selector-header">
                <span class="required-badge">⚠️ 必选</span>
                <h4 class="selector-title">第一步：选择模型类型</h4>
                <p class="selector-hint">请先选择您要使用的模型类型（绘画或视频）</p>
              </div>

              <div class="selector-options">
                <label class="model-type-option">
                  <input type="radio" name="modelType" value="image">
                  <div class="option-content">
                    <span class="option-icon">🎨</span>
                    <span class="option-title">绘画模型</span>
                    <span class="option-desc">生成静态图片</span>
                  </div>
                </label>
                <label class="model-type-option">
                  <input type="radio" name="modelType" value="video">
                  <div class="option-content">
                    <span class="option-icon">🎬</span>
                    <span class="option-title">视频模型</span>
                    <span class="option-desc">生成动态视频</span>
                  </div>
                </label>
              </div>
            </div>
