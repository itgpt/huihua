            <!-- 绘画模型区域 -->
            <div id="imageModelSection" style="display:none;">
              <!-- 绘画平台选择器 -->
              <div class="video-platform-selector">

                    <input type="radio" name="imagePlatform" value="openai">

                  <label class="platform-option">
                    <input type="radio" name="imagePlatform" value="gemini">
                    <span>Gemini</span>
                  </label>
                  <label class="platform-option">
                    <input type="radio" name="imagePlatform" value="grok">

                  <label class="platform-option">

                  </label>

              </div>

              <div id="openaiModels" class="platform-models" style="display:none;">

                <select id="openaiModelSelect" multiple size="5"

                  <option value="gpt-image-1-vip">gpt-image-1-vip</option>

                  <option value="gemini-3-pro-image-preview">gemini-3-pro-image-preview（香蕉Pro）

                  <option value="gemini-3-pro-image-preview-4k-url">

                  <option value="gemini-3.1-flash-image-preview">gemini-3.1-flash-image-preview（新香蕉
                    3.1）</option>
                  <option value="gemini-3.1-flash-image-preview-4k">
                    gemini-3.1-flash-image-preview-4k（新香蕉 3.1 4K）</option>
                </select>
              </div>

              <!-- Grok 模型列表 -->
              <div id="grokImageModels" class="platform-models" style="display:none;">

                  <option value="grok-4-image">grok-4-image</option>
                  <option value="grok-4.1-image">grok-4.1-image</option>
                </select>

              <!-- Doubao 模型列表 -->
