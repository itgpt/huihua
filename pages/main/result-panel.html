      <!-- 右侧结果面板 -->
      <div class="right-panel">
        <div class="card result-card">
          <h3>
            <span class="icon-box" style="background: linear-gradient(135deg, #fccb90, #d57eeb);">🖼️</span>
            创作画廊
          </h3>
          <div class="card-body result-body">
            <div class="loading" id="loading">
              <div class="spinner"></div>
              <p>AI 正在挥洒创意...</p>
            </div>

            <!-- 视频任务容器 -->
            <div id="videoTasksContainer" class="video-tasks-container" style="display: none;">
