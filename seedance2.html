        function clearLogs() {
            if (!confirm('Á°ģŚģöŤ¶ĀśłÖÁ©ļśČÄśúČÁ≥ĽÁĽüśó•ŚŅóŚźóÔľ?)) return;
            appLogs = [];
            saveLogs();
            renderLogs();
        }

        function calculateCostFromUsage(usage, modelId, hasVideo) {
            let u = usage;
            if (!u || typeof u !== 'object') {
                return { tokens: null, cost: null };
            }
            const tokens = u.total_tokens || u.completion_tokens || u.prompt_tokens || null;
            if (tokens === null) return { tokens: null, cost: null };

            let pricePerMillion = 0;
            const model = (modelId || '').toLowerCase();
            if (model.includes('fast')) {
                pricePerMillion = hasVideo ? 22 : 37;
            } else {
                pricePerMillion = hasVideo ? 28 : 46;
            }
            const cost = (tokens / 1000000) * pricePerMillion;
            return { tokens, cost: cost.toFixed(4) };
        }

        function formatDuration(seconds) {
            if (seconds < 60) {
                return `${seconds}s`;
            } else if (seconds < 3600) {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}m${s.toString().padStart(2, '0')}s`;
            } else {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h}h${m.toString().padStart(2, '0')}m${s.toString().padStart(2, '0')}s`;
            }
        }

        function removeTaskRecord(taskId) {
            const task = activeTasks.get(taskId);
            if (task && task.timer) clearInterval(task.timer);
            if (task && task.displayTimer) clearInterval(task.displayTimer);
            activeTasks.delete(taskId);
            renderTaskRecords();
            saveTaskRecords();
        }

        function clearTaskRecords() {
            if (!confirm('Á°ģŚģöŤ¶ĀśłÖÁ©ļśČÄśúČšĽĽŚä°ŤģįŚĹēŚźóÔľ?)) return;
            activeTasks.forEach(task => {
                if (task.timer) clearInterval(task.timer);
                if (task.displayTimer) clearInterval(task.displayTimer);
            });
            activeTasks.clear();
            renderTaskRecords();
            saveTaskRecords();
        }

        function trimTaskRecords() {
            const limit = parseInt(document.getElementById('taskRecordLimit').value) || 30;
            const tasks = Array.from(activeTasks.entries());
            if (tasks.length <= limit) return;
            const toRemove = tasks.filter(([, t]) => t.status === 'succeeded' || t.status === 'failed');
            while (activeTasks.size > limit && toRemove.length > 0) {
                const [id, task] = toRemove.shift();
                if (task.timer) clearInterval(task.timer);
                if (task.displayTimer) clearInterval(task.displayTimer);
                activeTasks.delete(id);
            }
        }

        function saveTaskRecords() {
            let records = [];
            activeTasks.forEach(task => {
                records.push(compactTaskForStorage(task));
            });
            while (records.length > 0) {
                const didSave = safeSetLocalStorage('seedance_task_records', JSON.stringify(records), () => false);
                if (didSave) return;
                records = records.slice(0, Math.max(1, Math.floor(records.length / 2)));
            }
            safeSetLocalStorage('seedance_task_records', '[]');
        }

        function loadTaskRecords() {
            try {
                const records = JSON.parse(localStorage.getItem('seedance_task_records') || '[]');
                records.forEach(record => {
                    const compactRecord = compactTaskForStorage({
                        ...record,
                        timer: null,
                        displayTimer: null,
                        isDebugOpen: Boolean(record.isDebugOpen),
                        kind: getTaskKind(record)
                    });
                    activeTasks.set(compactRecord.id, compactRecord);
                    if (compactRecord.status === 'running') {
                        startPollingForTask(compactRecord.id);
                    }
                });
                saveTaskRecords();
            } catch (e) {
                activeTasks.clear();
                safeSetLocalStorage('seedance_task_records', '[]');
            } finally {
                renderTaskRecords();
            }
        }
        function escapeHtml(text) {
            return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ==================== ŚéÜŚŹ≤ŤģįŚĹēÔľąŚļēťÉ®ÔľČ ====================
        function addToHistory(record) {
            let history = JSON.parse(localStorage.getItem('seedance_history') || '[]');
            const limit = parseInt(document.getElementById('historyLimitConfig').value) || 30;

            history.unshift(compactHistoryRecord(record));
            if (history.length > limit) history = history.slice(0, limit);

            history = history.map(compactHistoryRecord);
            while (history.length > 0) {
                const didSave = safeSetLocalStorage('seedance_history', JSON.stringify(history), () => false);
                if (didSave) {
                    loadHistory();
                    return;
                }
                history = history.slice(0, Math.max(1, Math.floor(history.length / 2)));
            }
            safeSetLocalStorage('seedance_history', '[]');
            loadHistory();
        }

        function loadHistory() {
            let history = [];
            try {
                history = JSON.parse(localStorage.getItem('seedance_history') || '[]');
            } catch (e) {
                history = [];
            }
            history = history.map(compactHistoryRecord);
            safeSetLocalStorage('seedance_history', JSON.stringify(history), () => false);
            const container = document.getElementById('historyList');

            if (history.length === 0) {
                container.innerHTML = '<div class="empty-state">śöāśó†ÁĒüśąźŤģįŚĹē</div>';
                return;
            }

            container.innerHTML = history.map((item, index) => {
                const mediaType = getHistoryMediaType(item);
                const resultUrl = getHistoryResultUrl(item);
                const thumbHtml = resultUrl
                    ? (mediaType === 'image'
                        ? `<img src="${resultUrl}" alt="">`
                        : `<video src="${resultUrl}" preload="metadata"></video>`)
                    : '<div class="empty-state" style="padding: 28px 8px;">ÁĽďśěúśú™śĆĀšĻÖŚĆĖ</div>';
                const imageCanBecomeVideoAsset = mediaType === 'image' && /^https?:\/\//i.test(item.publicUrl || item.imageUrl || '');
                return `
                    <div class="history-item">
                        <div class="history-thumb" onclick="playHistoryResult(${index})">
                            ${thumbHtml}
                        </div>
                        <div class="history-info">
                            <div class="history-meta">
                                ${buildTaskKindBadge(item)}
                                <span>${new Date(item.time).toLocaleString()}</span>
                            </div>
                            <div style="font-size:11px;color:#86909c;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;" title="${escapeHtml(item.prompt || '')}">${escapeHtml((item.prompt || '').substring(0, 40))}</div>
                        </div>
                        <div class="history-actions">
                            <button class="btn btn-primary btn-sm" onclick="playHistoryResult(${index})">‚Ė∂ÔłŹ ťĘĄŤßą</button>
                            <button class="btn btn-success btn-sm" onclick="reuseHistory(${index})">ūüĒĄ Ś§ćÁĒ®</button>
                            ${mediaType === 'video' && item.videoUrl ? `<button class="btn btn-secondary btn-sm" onclick="submitSubtitleEraseTaskFromHistory(${index})">ūü™Ą śď¶ťô§Ś≠óŚĻē</button>` : ''}
                            ${imageCanBecomeVideoAsset ? `<button class="btn btn-secondary btn-sm" onclick="addHistoryImageToVideoAssets(${index})">ūüé¨ Śä†ŚąįŤßÜťĘĎ</button>` : ''}
                            <button class="btn btn-danger btn-sm" onclick="deleteHistory(${index})">ūüóĎÔł?/button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getHistoryMediaType(item) {
            return item?.kind === 'image_generate' || item?.imageUrl ? 'image' : 'video';
        }

        function getHistoryResultUrl(item) {
            return getHistoryMediaType(item) === 'image'
                ? (item.publicUrl || item.imageUrl || '')
                : (item.videoUrl || '');
        }

        function playHistoryResult(index) {
            const history = JSON.parse(localStorage.getItem('seedance_history') || '[]');
            const item = history[index];
            const resultUrl = getHistoryResultUrl(item);
            if (item && resultUrl) {
                openPreviewWindow(getHistoryMediaType(item), resultUrl, `šĽĽŚä° ID: ${item.id || 'N/A'}`, 'ŚéÜŚŹ≤ÁĽďśěúťĘĄŤßą');
            }
        }

        function playHistoryVideo(index) {
            playHistoryResult(index);
        }

        function reuseHistory(index) {
            const history = JSON.parse(localStorage.getItem('seedance_history') || '[]');
            const item = history[index];
            if (!item) return;

            if (getHistoryMediaType(item) === 'image') {
                switchWorkspaceMode('image');
                document.getElementById('imagePrompt').value = item.prompt || '';
                if (item.params?.aspectRatio || item.params?.aspect_ratio || item.params?.size) {
                    document.getElementById('imageAspectRatio').value = normalizeImageAspectRatio(item.params.aspectRatio || item.params.aspect_ratio || item.params.size);
                }
                if (item.params?.responseFormat) document.getElementById('imageResponseFormat').value = item.params.responseFormat;
                if (item.params?.generationCount) document.getElementById('imageGenerationCount').value = item.params.generationCount;
                saveAllConfigs();
                alert('Ś∑≤Ś§ćÁĒ®ŚõĺÁČáÁĒüśąźťÖćÁĹģÔľĆŚŹĮŚú®ś≠§ŚüļÁ°ÄšłäšŅģśĒĻŚźéťáćśĖįÁĒüśąź');
                return;
            }

            switchWorkspaceMode('video');
            if (item.params) {
                if (item.params.model) setSelectedModelId(item.params.model);
                if (item.params.resolution) document.getElementById('resolution').value = item.params.resolution;
                if (item.params.ratio) document.getElementById('ratio').value = item.params.ratio;
                if (item.params.duration) document.getElementById('duration').value = item.params.duration;
                if (item.params.seed !== undefined) document.getElementById('seed').value = item.params.seed;
                if (item.params.generateAudio !== undefined) document.getElementById('generateAudio').checked = item.params.generateAudio;
            }

            if (item.assets) {
                assets = JSON.parse(JSON.stringify(item.assets));
                updateAssetsList();
            }

            if (item.promptHtml) {
                promptEditor.innerHTML = item.promptHtml;
            } else if (item.prompt) {
                promptEditor.innerHTML = '';
                promptEditor.textContent = item.prompt;
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
            alert('Ś∑≤Ś§ćÁĒ®ŚéÜŚŹ≤ťÖćÁĹģÔľĆŚŹĮŚú®ś≠§ŚüļÁ°ÄšłäšŅģśĒĻŚźéťáćśĖįśŹźšļ§');
        }

        function addHistoryImageToVideoAssets(index) {
            const history = JSON.parse(localStorage.getItem('seedance_history') || '[]');
            const item = history[index];
            const imageUrl = item?.publicUrl || item?.imageUrl || '';
            if (!/^https?:\/\//i.test(imageUrl)) {
                alert('ŤŅôśĚ°ŚõĺÁČáŚéÜŚŹ≤ś≤°śúČŚÖ¨ÁĹĎ URLÔľĆšłćŤÉĹšĹúšłļŤßÜťĘĎÁī†śĚ?);
                return;
            }
            addAsset('image', imageUrl, `ŚéÜŚŹ≤ÁĒüŚõĺ-${(item.id || '').slice(-8) || index}`);
            switchWorkspaceMode('video');
            addLog('info', 'Ś∑≤šĽéŚéÜŚŹ≤ś∑ĽŚä†ŚõĺÁČáŚąįŤßÜťĘĎÁī†śĚ?, imageUrl);
        }

        function deleteHistory(index) {
            let history = JSON.parse(localStorage.getItem('seedance_history') || '[]');
            history.splice(index, 1);
            localStorage.setItem('seedance_history', JSON.stringify(history));
            loadHistory();
        }

        function clearHistory() {
            if (confirm('Á°ģŚģöŤ¶ĀśłÖÁ©ļśČÄśúČŚéÜŚŹ≤ŤģįŚĹēŚźóÔľ?)) {
                localStorage.removeItem('seedance_history');
                loadHistory();
            }
        }
    </script>
</body>
</html>
